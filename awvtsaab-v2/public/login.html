<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Awvtsaab's 漆书 — Login</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
  /* ---------- 视觉样式（简洁版，保留动感背景） ---------- */
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Share Tech Mono", monospace, Arial;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
  }

  /* 🎥 背景视频：在手机和PC上完整显示原比例，无滤镜 */
  .card {
    position: relative;
    overflow: hidden;
  }

  #bg-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;   /* 保持完整比例 */
    z-index: 0;
  }

  .card-content {
    position: relative;
    z-index: 2;
    background: rgba(0,0,0,0.4); /* 半透明遮罩 */
    padding: 32px;
    border-radius: 16px;
  }
  /* logo */
  .logo {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }
  .logo img {
    width: 96px;
    filter: drop-shadow(0 4px 16px rgba(0,180,255,0.15));
  }

  h1 {
    text-align: center;
    margin: 8px 0 20px;
    font-size: 22px;
    letter-spacing: 1px;
  }

  .field { margin-bottom: 12px; }

  input, select {
    width: 100%;
    padding: 13px 14px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: #fff;
    outline: none;
    font-size: 15px;
  }
  input::placeholder {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
  }

  /* select 单独设置 */
  select {
    background: rgba(0,150,255,0.15);
    color: #fff;
  }

  /* 按钮 */
  .row { display: flex; gap: 10px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.6px;
    background: linear-gradient(90deg, #00e0ff, #0078ff);
    transition: transform 0.18s, box-shadow 0.18s;
    color: #031018;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(0,200,255,0.15);
  }

  .link-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
  }

  /* 提示/状态信息 */
  .status {
    margin-top: 14px;
    padding: 12px;
    border-radius: 10px;
    background: rgba(0,0,0,0.5);
    font-size: 14px;
    min-height: 38px;
  }
  .status.success { border-left: 4px solid #3be37a; }
  .status.error { border-left: 4px solid #ff6b6b; }

  .hidden { display: none; }

  /* small / muted */
  .small {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    text-align: center;
    margin-top: 12px;
  }
  .muted { color: rgba(255,255,255,0.65); font-size: 13px; }

  /* 语言选择器样式 */
  .lang-selector {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .lang-btn {
    padding: 8px 16px;
    border-radius: 8px;
    background: rgba(0,150,255,0.15);
    border: 1px solid rgba(0,200,255,0.3);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn:hover {
    background: rgba(0,150,255,0.25);
  }
  .lang-btn.active {
    background: rgba(0,200,255,0.4);
    border-color: #00e0ff;
  }

  /* 欢迎页面样式 */
  .welcome-container {
    text-align: center;
  }
  .welcome-icon {
    font-size: 48px;
    margin-bottom: 20px;
    color: #00e0ff;
  }
  .welcome-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  /* 📱 responsive */
  @media (max-width: 420px) {
    .card { padding: 24px; width: 90vw; }
    h1 { font-size: 20px; }
    input, select { padding: 11px; font-size: 14px; }
    .btn { padding: 11px; font-size: 14px; }
    .welcome-buttons { flex-direction: column; }
  }
</style>

  // 应用语言翻译
  function applyTranslations(lang) {
    const t = translations[lang] || translations.en;
    
    // 更新所有文本元素
    document.getElementById('welcomeTitle').textContent = t.welcomeTitle;
    document.getElementById('welcomeSubtitle').textContent = t.welcomeSubtitle;

    document.getElementById('loginFooter').textContent = t.loginFooter;

    }
  }

  // 切换语言
  function changeLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('preferredLang', lang);
    
    // 更新按钮激活状态
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    
    // 应用翻译
    applyTranslations(lang);
    
    // 如果当前在欢迎页面，切换到登录页面
    if (!document.getElementById('welcomeView').classList.contains('hidden')) {
      showLogin();
    }
  }

  // 初始化语言
  function initLanguage() {
    // 设置初始语言按钮状态
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
      btn.addEventListener('click', () => changeLanguage(btn.dataset.lang));
    });

    applyTranslations(currentLang);

  // ---------- UI helpers ----------
  const statusBox = document.getElementById('statusBox');
  function setStatus(msg, type) {
    statusBox.className = 'status';
    if (type === 'success') { statusBox.classList.add('success'); }
    else if (type === 'error') { statusBox.classList.add('error'); }
    else { /* neutral */ }
    statusBox.textContent = msg;
  }

  function showWelcome() {
    document.getElementById('welcomeView').classList.remove('hidden');
    document.getElementById('authViews').classList.add('hidden');
    document.getElementById('userView').classList.add('hidden');
  }

  function showLogin() {
    document.getElementById('welcomeView').classList.add('hidden');
    document.getElementById('authViews').classList.remove('hidden');
    document.getElementById('loginView').classList.remove('hidden');
    document.getElementById('signupView').classList.add('hidden');
    document.getElementById('userView').classList.add('hidden');
  }

  function showSignup() {
    document.getElementById('welcomeView').classList.add('hidden');
    document.getElementById('authViews').classList.remove('hidden');
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('signupView').classList.remove('hidden');
    document.getElementById('userView').classList.add('hidden');
  }

  // ---------- Auth logic ----------
  async function signup(){
    const t = translations[currentLang];
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const age = document.getElementById('signupAge').value;
    const gender = document.getElementById('signupGender').value;
    const phone = document.getElementById('signupPhone').value.trim();

    if (!name || !email || password.length < 6) {
      setStatus(t.statusFillRequired, 'error'); return;
    }

    setStatus(t.statusCreatingAccount, null);
    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const uid = userCredential.user.uid;

      // Save profile to Realtime Database
      const profile = {
        name,
        email,
        age: age? Number(age) : null,
        gender: gender || null,
        phone: phone || null,
        preferredLang: currentLang,
        createdAt: firebase.database.ServerValue.TIMESTAMP
      };

      await db.ref('users/' + uid).set(profile);

      setStatus(t.statusSignupSuccess, 'success');

      // Optionally send email verification
      // await userCredential.user.sendEmailVerification();
    } catch (err) {
      console.error(err);
      setStatus(t.statusAuthError + ': ' + (err.message || err), 'error');
    }
  }

  async function login() {
    const t = translations[currentLang];
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { 
      setStatus(t.statusEnterCredentials, 'error'); 
      return; 
    }

    setStatus(t.statusLoggingIn, null);
    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      setStatus(t.statusLoginSuccess, 'success');

      // 🔑 Redirect to home.html after login
      window.location.href = 'home.html';
    } catch (err) {
      console.error(err);
      setStatus(t.statusAuthError + ': ' + (err.message || err), 'error');
    }
  }

  function signout(){
    const t = translations[currentLang];
    setStatus(t.statusSigningOut, null);
    auth.signOut().then(()=>{ 
      setStatus(t.statusSignedOut, null); 
      showWelcome();
    }).catch(err=>{
      setStatus(t.statusAuthError + ': ' + err.message, 'error');
    });
  }

  function continueToApp() {
    window.location.href = 'home.html';
  }

  // ---------- Presence (Realtime) ----------

    if (!user) return;
    const uid = user.uid;
    const userStatusRef = db.ref('/status/' + uid);

    const isOfflineForDatabase = {
      state: 'offline',
      last_changed: firebase.database.ServerValue.TIMESTAMP
    };
    const isOnlineForDatabase = {
      state: 'online',
      last_changed: firebase.database.ServerValue.TIMESTAMP
    };

    const connectedRef = db.ref('.info/connected');
    connectedRef.on('value', snap => {
      if (snap.val() === true) {
        userStatusRef.onDisconnect().set(isOfflineForDatabase).then(() => {
          userStatusRef.set(isOnlineForDatabase);
        });
      }
    });
  }

  // ---------- Auth state listener ----------
  auth.onAuthStateChanged(async user => {
    if (user) {
      // Show user view
      document.getElementById('welcomeView').classList.add('hidden');
      document.getElementById('authViews').classList.add('hidden');
      document.getElementById('userView').classList.remove('hidden');

      const t = translations[currentLang];
      setStatus(t.statusReady, null);

      // load profile from DB
      const profileSnap = await db.ref('users/' + user.uid).once('value');
      const profile = profileSnap.val() || {};
      document.getElementById('welcomeUserTitle').textContent = `${t.welcomeUserTitle}, ${profile.name || (user.email || 'User')}`;
      document.getElementById('userInfo').textContent = `Email: ${user.email}  ·  Age: ${profile.age || '—'}  ·  Gender: ${profile.gender || '—'}`;

      // Set presence
      setUserPresence(user);

      // Listen to presence changes for this user and show them
      const presRef = db.ref('status/' + user.uid);
      presRef.on('value', snap => {
        const v = snap.val();
        document.getElementById('presenceText').textContent = v ? v.state + ' (updated ' + (v.last_changed ? new Date(v.last_changed).toLocaleString() : '—') + ')' : '—';
      });

      setStatus(t.statusReady, 'success');
    } else {
      // Not logged in: show welcome page
      document.getElementById('userView').classList.add('hidden');
      document.getElementById('authViews').classList.add('hidden');
      document.getElementById('welcomeView').classList.remove('hidden');
      
      const t = translations[currentLang];
      setStatus(t.statusReady, null);
      document.getElementById('presenceText').textContent = '—';
    }
  });

  // 初始化页面
  window.addEventListener('load', () => {
    initLanguage();
    initVideo();
  });

  </script>
</body>
</html>
