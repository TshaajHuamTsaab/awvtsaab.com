<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 奇迹踪印</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        /* ====== 酷炫App框架样式 ====== */
        :root {
            --primary-color: #00ff99;
            --primary-glow: rgba(0, 255, 153, 0.7);
            --secondary-color: #00ff66;
            --accent-color: #00ccff;
            --bg-dark: #0d0d0d;
            --bg-darker: #050505;
            --card-bg: linear-gradient(145deg, #121212 0%, #1c1c1c 100%);
            --text-light: #aaffd5;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at top, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--primary-color);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            padding-bottom: 80px;
        }
        
        /* ====== 背景视频 ====== */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.55;
            filter: blur(1px) brightness(0.95) contrast(1.1);
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
            pointer-events: none;
        }
        
        /* ====== 应用Logo ====== */
        .app-logo {
            text-align: center;
            padding: 20px 0 10px;
        }
        
        .app-logo img {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            box-shadow: 0 0 20px rgba(0, 255, 153, 0.3);
        }
        
        /* ====== 音频控制按钮 ====== */
        .audio-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        
        .audio-toggle, .video-audio-toggle {
            background: rgba(0, 255, 153, 0.8);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .audio-toggle:hover, .video-audio-toggle:hover {
            background: rgba(0, 255, 153, 1);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 153, 0.8);
        }
        
        /* ====== 页面容器 ====== */
        .page-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .page-container.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* ====== 底部导航 ====== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(0, 255, 153, 0.2);
            z-index: 1000;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-light);
            font-size: 12px;
            transition: var(--transition);
            padding: 5px 10px;
            border-radius: 10px;
        }
        
        .bottom-nav a i {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .bottom-nav a.active {
            color: var(--primary-color);
            background: rgba(0, 255, 153, 0.1);
        }
        
        .bottom-nav a:hover:not(.active) {
            color: var(--primary-color);
        }
        
        /* ====== Toast提示 ====== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            z-index: 10000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            font-size: 14px;
            max-width: 300px;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        /* ====== 主容器样式 ====== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(13, 13, 13, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(0, 255, 153, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .header {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 40px;
            text-shadow: 0 0 15px var(--primary-glow);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ff99, #00ff66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            font-size: 1.2rem;
            color: var(--text-light);
            opacity: 0.9;
        }
        
        /* ====== 收藏书籍网格样式 ====== */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .book-card {
            background: var(--card-bg);
            border: 1px solid rgba(0,255,100,0.2);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            height: 320px;
        }
        
        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 255, 153, 0.2);
            border-color: rgba(0,255,100,0.6);
        }
        
        /* 添加光条效果 */
        .book-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }
        
        .book-card:hover::before {
            transform: scaleX(1);
        }
        
        .book-cover {
            height: 160px;
            overflow: hidden;
            position: relative;
        }
        
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .book-card:hover .book-cover img {
            transform: scale(1.05);
        }
        
        /* 添加封面光晕 */
        .book-cover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,255,153,0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .book-card:hover .book-cover::after {
            opacity: 1;
        }
        
        .book-info {
            padding: 12px;
            background: rgba(18, 18, 18, 0.8);
            height: calc(100% - 160px);
            display: flex;
            flex-direction: column;
        }
        
        .book-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 6px;
            color: #00ff88;
            line-height: 1.3;
            height: 2.6em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .book-author {
            color: var(--text-light);
            font-size: 0.8rem;
            margin-bottom: 8px;
            height: 1.2em;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        
        /* 星星评分样式 - 小型化 */
        .book-rating {
            display: flex;
            gap: 1px;
            margin-bottom: 8px;
            align-items: center;
        }
        
        .star {
            color: #333;
            font-size: 10px;
            position: relative;
        }
        
        .star.filled {
            color: #ffcc00;
            text-shadow: 0 0 3px rgba(255, 204, 0, 0.7);
        }
        
        .star.half::before {
            content: '\f005';
            position: absolute;
            left: 0;
            width: 50%;
            overflow: hidden;
            color: #ffcc00;
            text-shadow: 0 0 3px rgba(255, 204, 0, 0.7);
        }
        
        .rating-text {
            font-size: 0.7rem;
            color: #88ccaa;
            margin-left: 4px;
        }
        
        .book-description {
            color: #88ccaa;
            font-size: 0.75rem;
            line-height: 1.3;
            margin-bottom: 10px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 按钮容器 */
        .book-buttons {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }
        
        .read-btn {
            background: linear-gradient(135deg, #00ff99, #00ff66);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            flex: 1;
            font-size: 0.75rem;
            box-shadow: 0 0 8px rgba(0, 255, 153, 0.3);
        }
        
        .read-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0, 255, 153, 0.4);
        }
        
        /* 收藏按钮 - 小型化 */
        .favorite-btn {
            background: rgba(255, 204, 0, 0.2);
            border: 1px solid #ff9900;
            color: #ff9900;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .favorite-btn:hover {
            background: rgba(255, 204, 0, 0.3);
            border-color: #ffcc00;
            color: #ffcc00;
            transform: scale(1.1);
        }
        
        .favorite-btn.favorited {
            background: rgba(255, 204, 0, 0.2);
            color: #ff9900;
            border-color: #ff9900;
        }
        
        /* 分类区域 */
        .category-section {
            display: none;
        }
        
        .category-section.active {
            display: block;
        }
        
        .section-title {
            color: var(--secondary-color);
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 102, 0.3);
        }
        
        /* 空状态样式 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            opacity: 0.7;
            grid-column: 1 / -1;
        }
        
        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state p {
            font-size: 1rem;
            margin-bottom: 10px;
        }
        
        .empty-state .sub-text {
            font-size: 0.85rem;
            color: #88ccaa;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .book-card {
                height: 300px;
            }
            
            .book-cover {
                height: 140px;
            }
            
            .book-info {
                padding: 10px;
                height: calc(100% - 140px);
            }
            
            .audio-toggle, .video-audio-toggle {
                width: 45px;
                height: 45px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .books-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            .book-card {
                height: 280px;
            }
            
            .book-cover {
                height: 130px;
            }
            
            .book-info {
                height: calc(100% - 130px);
            }
            
            .book-title {
                font-size: 0.9rem;
            }
            
            .container {
                padding: 15px;
                margin: 10px;
            }
            
            .audio-controls {
                flex-direction: column;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 🎥 背景视频 -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="../database/videos/dragon.mp4" type="video/mp4" />
    </video>

    <!-- 🎵 背景音乐 -->
    <audio id="bg-music" loop>
        <source src="https://res.cloudinary.com/dpw8l6gk2/video/upload/v1762597601/angel_pygqtw.mp4" type="audio/mp4">
        <source src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3" type="audio/mp3">
    </audio>

    <!-- 🔊 音频控制 -->
    <div class="audio-controls">
        <button id="audioToggle" class="audio-toggle">🔇</button>
        <button id="videoAudioToggle" class="video-audio-toggle">🔇</button>
    </div>

    <!-- App Logo -->
    <div class="app-logo">
        <img src="https://i.postimg.cc/3x3QzSGq/cropped-favicon-180x180.png" alt="App Logo">
    </div>

    <!-- ❤️ 收藏页面 -->
    <div id="favorites-page" class="page-container active">
        <div class="container">
            <div class="header">
                <h1>❤️ 我的收藏</h1>
                <p>珍藏的书籍</p>
            </div>
            
            <div id="favorites-content">
                <!-- 收藏内容由JavaScript动态生成 -->
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在加载收藏列表...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a href="home.html" class="nav-btn">
            <i class="fa-solid fa-house"></i><span>首页</span>
        </a>
        <a href="library.html" class="nav-btn">
            <i class="fa-solid fa-book-open"></i><span>书库</span>
        </a>
        <a href="favorites.html" class="nav-btn active">
            <i class="fa-solid fa-bookmark"></i><span>收藏</span>
        </a>
        <a href="history.html" class="nav-btn">
            <i class="fa-solid fa-clock"></i><span>阅读记录</span>
        </a>
        <a href="profile.html" class="nav-btn">
            <i class="fa-solid fa-user"></i><span>我</span>
        </a>
    </div>

    <script>
        // ================== 酷炫App框架功能 ==================
        
        // 🎵 音频控制功能
        const bgMusic = document.getElementById('bg-music');
        const bgVideo = document.getElementById('bg-video');
        const audioToggle = document.getElementById('audioToggle');
        const videoAudioToggle = document.getElementById('videoAudioToggle');
        
        let audioEnabled = false;
        let videoAudioEnabled = false;
        let userInteracted = false;

        function initAudio() {
            bgMusic.volume = 0.3;
            bgMusic.muted = true;
            
            const savedAudioState = localStorage.getItem('audioEnabled');
            const savedVideoAudioState = localStorage.getItem('videoAudioEnabled');
            
            if (savedAudioState === 'true') {
                audioEnabled = true;
                audioToggle.textContent = "🔊";
                bgMusic.muted = false;
            } else {
                audioEnabled = false;
                audioToggle.textContent = "🔇";
                bgMusic.muted = true;
            }
            
            if (savedVideoAudioState === 'true') {
                videoAudioEnabled = true;
                videoAudioToggle.textContent = "🔊";
                bgVideo.muted = false;
            } else {
                videoAudioEnabled = false;
                videoAudioToggle.textContent = "🔇";
                bgVideo.muted = true;
            }
        }

        audioToggle.addEventListener('click', () => {
            if (!userInteracted) {
                userInteracted = true;
                bgMusic.play().catch(err => {
                    console.log("音频播放被阻止:", err);
                    showToast("请点击页面任意位置启用音频播放");
                });
            }
            
            audioEnabled = !audioEnabled;
            bgMusic.muted = !audioEnabled;
            audioToggle.textContent = audioEnabled ? "🔊" : "🔇";
            
            localStorage.setItem('audioEnabled', audioEnabled.toString());
            
            if (audioEnabled) {
                showToast("🎵 背景音乐已开启");
            } else {
                showToast("🔇 背景音乐已关闭");
            }
        });
        
        videoAudioToggle.addEventListener('click', () => {
            videoAudioEnabled = !videoAudioEnabled;
            bgVideo.muted = !videoAudioEnabled;
            videoAudioToggle.textContent = videoAudioEnabled ? "🔊" : "🔇";
            
            localStorage.setItem('videoAudioEnabled', videoAudioEnabled.toString());
            
            if (videoAudioEnabled) {
                showToast("🎥 视频原声已开启");
            } else {
                showToast("🔇 视频原声已关闭");
            }
        });

        document.addEventListener('click', () => {
            if (!userInteracted) {
                userInteracted = true;
                bgMusic.play().catch(err => {
                    console.log("音频自动播放被阻止:", err);
                });
            }
        });

        // ================== 工具函数 ==================
        
        function showToast(msg) {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add("show"), 10);
            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // ================== 星星评分渲染 ==================
        function renderRating(rating) {
            if (!rating) return '<div class="book-rating">暂无评分</div>';
            
            const stars = Math.floor(rating);
            const hasHalf = rating % 1 >= 0.5;
            let html = '';
            
            for (let i = 1; i <= 5; i++) {
                if (i <= stars) {
                    html += '<i class="fas fa-star star filled"></i>';
                } else if (i === stars + 1 && hasHalf) {
                    html += '<i class="fas fa-star star half"></i>';
                } else {
                    html += '<i class="far fa-star star"></i>';
                }
            }
            
            return `<div class="book-rating">${html}<span class="rating-text">${rating.toFixed(1)}</span></div>`;
        }

        // ================== 收藏功能 ==================
        
        // 从收藏中移除书籍
        function removeFromFavorites(bookId, category) {
            let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
            const initialLength = favorites.length;
            
            // 过滤掉要移除的书籍
            favorites = favorites.filter(fav => !(fav.id === bookId && fav.category === category));
            
            // 如果确实有移除操作
            if (favorites.length < initialLength) {
                localStorage.setItem("favorites", JSON.stringify(favorites));
                showToast("💔 已取消收藏");
                return true;
            }
            return false;
        }

        // 跳转到阅读器
        function openReader(category, bookId) {
            // 先记录阅读历史
            const favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
            const book = favorites.find(fav => fav.id === bookId && fav.category === category);
            
            if (book) {
                const readingHistory = JSON.parse(localStorage.getItem("readingHistory") || "[]");
                
                // 检查是否已存在记录
                const existingIndex = readingHistory.findIndex(item => 
                    item.id === bookId && item.category === category
                );
                
                // 如果存在，先移除
                if (existingIndex !== -1) {
                    readingHistory.splice(existingIndex, 1);
                }
                
                // 添加新的阅读记录到开头
                const historyItem = {
                    id: book.id,
                    title: book.title,
                    author: book.author,
                    cover: book.cover,
                    category: book.category,
                    categoryName: book.categoryName,
                    date: new Date().toLocaleDateString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    })
                };
                
                readingHistory.unshift(historyItem);
                
                // 只保留最近50条记录
                if (readingHistory.length > 50) {
                    readingHistory.splice(50);
                }
                
                localStorage.setItem("readingHistory", JSON.stringify(readingHistory));
            }
            
            // 跳转到阅读器
            window.location.href = `reader.html?category=${category}&book=${bookId}&chapter=cover`;
        }

        // ================== 渲染收藏页面 ==================
        function renderFavoritesPage() {
            const container = document.getElementById('favorites-content');
            const favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
            
            if (favorites.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bookmark"></i>
                        <p>暂无收藏书籍</p>
                        <p class="sub-text">点击书库中的❤️按钮收藏书籍</p>
                    </div>
                `;
                return;
            }
            
            let booksHTML = '';
            favorites.forEach(book => {
                booksHTML += `
                    <div class="book-card" onclick="openReader('${book.category}', '${book.id}')">
                        <div class="book-cover">
                            <img src="${book.cover}" alt="${book.title}" onerror="this.src='../database/logo/default.gif'">
                        </div>
                        <div class="book-info">
                            <h3 class="book-title">${book.title}</h3>
                            <p class="book-author">${book.author}</p>
                            ${renderRating(book.rating || 0)}
                            <div style="color: #888; font-size: 0.7rem; margin: 3px 0;">${book.categoryName || '未分类'}</div>
                            ${book.description ? `<p class="book-description">${book.description}</p>` : ''}
                            <div class="book-buttons">
                                <button class="read-btn">阅读</button>
                                <button class="favorite-btn favorited" 
                                        onclick="event.stopPropagation(); toggleFavorite('${book.category}', '${book.id}', this)">
                                    <i class="fas fa-bookmark"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = `
                <h2 class="section-title">我的收藏 (${favorites.length}本)</h2>
                <div class="books-grid">${booksHTML}</div>
            `;
        }

        // 收藏/取消收藏功能
        function toggleFavorite(category, bookId, button) {
            event.stopPropagation();
            
            if (removeFromFavorites(bookId, category)) {
                // 重新渲染页面
                renderFavoritesPage();
            }
        }

        // ================== 初始化应用 ==================
        function initApp() {
            // 初始化音频
            initAudio();
            
            // 初始化页面导航
            initNavigation();
            
            // 渲染收藏页面
            renderFavoritesPage();
        }

        // 初始化页面导航
        function initNavigation() {
            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const href = btn.getAttribute('href');
                    if (href) {
                        window.location.href = href;
                    }
                });
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);
        
        // 监听收藏变化
        window.addEventListener('storage', function(e) {
            if (e.key === 'favorites') {
                renderFavoritesPage();
            }
        });
    </script>
</body>
</html>
