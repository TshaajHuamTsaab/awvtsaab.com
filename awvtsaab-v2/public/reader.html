<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Awv's奇迹踪印 - 玻璃看窗阅读机</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ==================== 量子玻璃看窗基础效果 ==================== */

/* 玻璃视频背景 - 高级效果 */
#quantum-video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    opacity: 0.7; /* 最佳观看透明度 */
    transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
    filter: 
        brightness(1.3) 
        contrast(1.2) 
        saturate(1.4)
        blur(0px);
    transform: scale(1.02); /* 轻微放大增强效果 */
}

/* 玻璃磨砂层 */
.glass-frost-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.05) 0%,
        rgba(255, 255, 255, 0.02) 50%,
        rgba(255, 255, 255, 0.05) 100%
    );
    backdrop-filter: blur(25px) saturate(200%);
    -webkit-backdrop-filter: blur(25px) saturate(200%);
    z-index: -1;
}

/* 动态玻璃折射效果 */
.glass-refraction {
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
        45deg,
        transparent 30%,
        rgba(255, 255, 255, 0.08) 50%,
        transparent 70%
    );
    animation: refraction-flow 20s infinite linear;
    pointer-events: none;
    z-index: -1;
}

@keyframes refraction-flow {
    0% { transform: rotate(0deg) translateX(-50%); }
    100% { transform: rotate(360deg) translateX(-50%); }
}

/* ==================== 主内容区玻璃效果 ==================== */
#content {
    padding: 30px;
    max-width: 900px;
    margin: auto;
    background: rgba(255, 255, 255, 0.12); /* 最佳玻璃透明度 */
    border-radius: 24px;
    margin-top: 30px;
    margin-bottom: 100px;
    
    /* 强化毛玻璃效果 */
    backdrop-filter: blur(35px) saturate(200%);
    -webkit-backdrop-filter: blur(35px) saturate(200%);
    
    /* 玻璃边框和阴影 */
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 
        0 25px 70px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.1);
    
    /* 玻璃内发光 */
    background-image: 
        linear-gradient(135deg, 
            rgba(255, 255, 255, 0.15) 0%, 
            rgba(255, 255, 255, 0.08) 50%, 
            rgba(255, 255, 255, 0.15) 100%);
    
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 1;
    overflow: hidden;
}

/* 玻璃光晕边框 */
#content::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(45deg, 
        rgba(0, 255, 204, 0.1), 
        rgba(0, 255, 153, 0.1), 
        rgba(0, 255, 102, 0.1));
    border-radius: 26px;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.5s ease;
}

#content:hover::before {
    opacity: 0.3;
    animation: content-glow 3s infinite alternate;
}

@keyframes content-glow {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.5; }
}

/* ==================== 控制面板玻璃效果 ==================== */
#controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.15); /* 透明玻璃 */
    padding: 20px 25px;
    
    /* 强化毛玻璃 */
    backdrop-filter: blur(35px) saturate(200%);
    -webkit-backdrop-filter: blur(35px) saturate(200%);
    
    /* 玻璃上边框 */
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 
        0 -10px 40px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    
    transform: translateY(0); 
    opacity: 1;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 900;
}

/* ==================== 章节标题玻璃特效 ==================== */
#chapter-title { 
    font-size: 2.4rem; 
    font-weight: 800; 
    margin-bottom: 35px; 
    color: #1a1a1a;
    text-align: center;
    padding: 20px;
    
    /* 标题玻璃效果 */
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 
        0 15px 40px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    
    /* 文字特效 */
    text-shadow: 
        0 2px 15px rgba(0, 0, 0, 0.1),
        0 0 30px rgba(255, 255, 255, 0.3);
    
    position: relative;
    overflow: hidden;
}

/* 标题光晕 */
#chapter-title::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.15), 
        transparent);
    animation: title-shine 8s infinite linear;
}

@keyframes title-shine {
    0% { left: -100%; }
    100% { left: 100%; }
}

/* ==================== 段落玻璃效果 ==================== */
.segment {
    line-height: 1.9;
    margin-bottom: 1.4rem;
    padding: 18px 24px;
    border-radius: 16px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    
    /* 段落玻璃 */
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* 玻璃边框 */
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 
        0 8px 25px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    
    position: relative;
    overflow: hidden;
}

/* 段落悬停光泽 */
.segment::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.12), 
        transparent);
    transition: left 0.6s ease;
    z-index: 0;
}

.segment:hover {
    transform: translateY(-3px) translateX(5px);
    background: rgba(255, 255, 255, 0.3);
    box-shadow: 
        0 15px 35px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    border-color: rgba(255, 255, 255, 0.35);
}

.segment:hover::before {
    left: 100%;
}

/* 当前段落高亮 - 玻璃增强 */
.segment.highlight {
    background: rgba(76, 175, 80, 0.35);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(76, 175, 80, 0.5);
    box-shadow: 
        0 0 40px rgba(76, 175, 80, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    font-weight: 600;
    transform: translateY(-2px);
}

/* 搜索匹配玻璃效果 */
.segment.search-match {
    background: rgba(255, 235, 59, 0.3);
    backdrop-filter: blur(15px);
    border-left: 5px solid rgba(255, 152, 0, 0.7);
}

.segment.current-search-match {
    background: rgba(255, 152, 0, 0.4);
    backdrop-filter: blur(20px);
    border-left: 5px solid rgba(255, 87, 34, 0.9);
    font-weight: bold;
}

/* ==================== 控制按钮玻璃特效 ==================== */
.control-grid {
    max-width: 900px; 
    margin: auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.control-btn {
    padding: 16px 12px;
    border: none;
    border-radius: 18px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 75px;
    
    /* 玻璃按钮效果 */
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* 玻璃边框 */
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 
        0 8px 25px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    
    position: relative;
    overflow: hidden;
}

/* 按钮光泽 */
.control-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(45deg, 
        rgba(255, 255, 255, 0.1) 0%, 
        transparent 50%, 
        rgba(255, 255, 255, 0.1) 100%);
    z-index: 0;
}

.control-btn:hover:not(:disabled) {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.3);
    box-shadow: 
        0 15px 40px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    border-color: rgba(255, 255, 255, 0.35);
}

.control-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
}

.control-btn i {
    font-size: 20px;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
}

.control-btn span {
    font-size: 12px;
    font-weight: 600;
    position: relative;
    z-index: 1;
}

/* 播放按钮特殊玻璃效果 */
.btn-play.playing {
    background: linear-gradient(45deg, 
        rgba(255, 107, 107, 0.4), 
        rgba(255, 142, 142, 0.4)) !important;
    animation: glass-pulse 2s infinite alternate;
    backdrop-filter: blur(20px) brightness(1.3);
    border-color: rgba(255, 107, 107, 0.6);
}

@keyframes glass-pulse {
    0% { 
        transform: translateY(-5px) scale(1);
        box-shadow: 
            0 15px 40px rgba(255, 107, 107, 0.4),
            inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    100% { 
        transform: translateY(-5px) scale(1.05);
        box-shadow: 
            0 20px 50px rgba(255, 107, 107, 0.6),
            inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }
}

/* ==================== 按钮颜色 - 玻璃渐变 ==================== */
.btn-prev { 
    background: linear-gradient(45deg, 
        rgba(102, 126, 234, 0.7), 
        rgba(118, 75, 162, 0.7)) !important; 
}
.btn-play { 
    background: linear-gradient(45deg, 
        rgba(76, 175, 80, 0.7), 
        rgba(129, 199, 132, 0.7)) !important; 
}
.btn-next { 
    background: linear-gradient(45deg, 
        rgba(255, 154, 158, 0.7), 
        rgba(250, 208, 196, 0.7)) !important; 
}
.btn-home { 
    background: linear-gradient(45deg, 
        rgba(0, 188, 212, 0.7), 
        rgba(77, 208, 225, 0.7)) !important; 
}
.btn-speed { 
    background: linear-gradient(45deg, 
        rgba(255, 215, 0, 0.7), 
        rgba(255, 224, 130, 0.7)) !important; 
    color: #333;
}
.btn-theme { 
    background: linear-gradient(45deg, 
        rgba(255, 111, 97, 0.7), 
        rgba(255, 153, 102, 0.7)) !important; 
}
.btn-playlist { 
    background: linear-gradient(45deg, 
        rgba(29, 233, 182, 0.7), 
        rgba(100, 255, 218, 0.7)) !important; 
}
.btn-llm { 
    background: linear-gradient(45deg, 
        rgba(240, 80, 177, 0.7), 
        rgba(169, 32, 232, 0.7)) !important; 
}
.btn-search { 
    background: linear-gradient(45deg, 
        rgba(16, 185, 129, 0.7), 
        rgba(6, 182, 212, 0.7)) !important; 
}

/* ==================== 搜索区域玻璃效果 ==================== */
.flex.flex-col.gap-2.p-4.border {
    background: rgba(239, 246, 255, 0.3) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(59, 130, 246, 0.3) !important;
    border-radius: 20px;
    box-shadow: 
        0 10px 30px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
}

/* 搜索输出框玻璃效果 */
.search-output-box {
    margin-top: 40px;
    padding: 25px;
    border-radius: 20px;
    
    /* 玻璃效果 */
    background: rgba(255, 255, 255, 0.25) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 
        0 15px 40px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.search-results {
    border-left: 6px solid rgba(14, 165, 233, 0.7);
}

.search-stats {
    border-left: 6px solid rgba(249, 115, 22, 0.7);
}

/* ==================== 音频播放器玻璃效果 ==================== */
#audio {
    width: 100%; 
    margin-top: 20px;
    border-radius: 18px;
    
    /* 玻璃音频播放器 */
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 
        0 10px 30px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

/* ==================== 持久切换按钮玻璃效果 ==================== */
#persistent-toggle-btn {
    font-size: 24px;
    height: 70px;
    width: 70px;
    border: none;
    outline: none;
    
    /* 玻璃效果 */
    background: rgba(156, 39, 176, 0.35);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    
    /* 玻璃边框 */
    border: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: 
        0 15px 45px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

#persistent-toggle-btn:hover {
    transform: scale(1.15) rotate(15deg);
    background: rgba(156, 39, 176, 0.5);
    box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
}

/* ==================== 搜索导航按钮玻璃效果 ==================== */
.search-nav {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    justify-content: center;
}

.search-nav-btn {
    padding: 12px 24px;
    border-radius: 25px;
    border: none;
    
    /* 玻璃按钮 */
    background: rgba(76, 175, 80, 0.35);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    color: white;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 
        0 8px 25px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.search-nav-btn:hover {
    transform: translateY(-4px);
    background: rgba(76, 175, 80, 0.5);
    box-shadow: 
        0 15px 35px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.search-nav-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

/* ==================== 加载和错误提示玻璃效果 ==================== */
.loading, .error {
    text-align: center;
    padding: 50px;
    font-size: 1.1rem;
    border-radius: 20px;
    
    /* 玻璃效果 */
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 
        0 15px 40px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.loading {
    color: #333;
}

.error {
    color: #dc3545;
}

/* ==================== 主题系统 - 玻璃适配 ==================== */
:root {
    --bg-color: #fafafa;
    --content-bg: #ffffff;
    --text-color: #333333;
    --title-color: #333333;
    --control-bg: #ffffff;
    --highlight-color: rgba(0, 180, 0, 0.3);
}

/* 暗黑主题玻璃 */
.theme-dark {
    --bg-color: #0a0a0a;
    --content-bg: #1a1a1a;
    --text-color: #e8e8e8;
    --title-color: #ffffff;
    --control-bg: #1a1a1a;
    --highlight-color: rgba(0, 255, 0, 0.35);
}

.theme-dark #content,
.theme-dark #controls,
.theme-dark .segment,
.theme-dark .control-btn,
.theme-dark .search-output-box,
.theme-dark .flex.flex-col.gap-2.p-4.border {
    background: rgba(0, 0, 0, 0.25) !important;
    border-color: rgba(255, 255, 255, 0.15) !important;
}

.theme-dark #chapter-title {
    background: rgba(0, 0, 0, 0.35);
    border-color: rgba(255, 255, 255, 0.2);
}

.theme-dark .segment.highlight {
    background: rgba(0, 255, 0, 0.25);
    border-color: rgba(0, 255, 0, 0.4);
}

/* 护眼主题玻璃 */
.theme-sepia {
    --bg-color: #f0e6d2;
    --content-bg: #f8f4e8;
    --text-color: #5c4b37;
    --title-color: #8b7355;
    --control-bg: #f0e6d2;
    --highlight-color: rgba(255, 220, 100, 0.6);
}

.theme-sepia #content,
.theme-sepia #controls,
.theme-sepia .segment,
.theme-sepia .control-btn,
.theme-sepia .search-output-box,
.theme-sepia .flex.flex-col.gap-2.p-4.border {
    background: rgba(240, 230, 210, 0.25) !important;
    border-color: rgba(139, 115, 85, 0.25) !important;
}

.theme-sepia #chapter-title {
    background: rgba(139, 115, 85, 0.25);
    border-color: rgba(139, 115, 85, 0.35);
}

.theme-sepia .segment.highlight {
    background: rgba(255, 220, 100, 0.5);
    border-color: rgba(255, 220, 100, 0.6);
}

/* ==================== 视频控制按钮 ==================== */
#video-controls {
    position: fixed;
    top: 30px;
    right: 30px;
    display: flex;
    gap: 12px;
    z-index: 950;
}

.video-control-btn {
    width: 55px;
    height: 55px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: #00ffcc;
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.video-control-btn:hover {
    transform: translateY(-5px) scale(1.1);
    background: rgba(0, 0, 0, 0.5);
    border-color: rgba(0, 255, 204, 0.5);
    box-shadow: 
        0 15px 40px rgba(0, 255, 204, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

/* ==================== 响应式设计 ==================== */
@media (max-width: 1024px) {
    #content {
        max-width: 95%;
        padding: 25px;
        margin-top: 25px;
    }
    
    .control-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    
    .segment {
        padding: 16px 20px;
    }
}

@media (max-width: 768px) {
    #content {
        padding: 20px;
        border-radius: 20px;
        margin-top: 20px;
        margin-bottom: 120px;
    }
    
    #chapter-title {
        font-size: 1.8rem;
        padding: 16px;
    }
    
    .control-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }
    
    .control-btn {
        min-height: 65px;
        padding: 14px 10px;
    }
    
    .segment {
        padding: 14px 18px;
    }
    
    .search-output-box {
        padding: 20px;
    }
}

@media (max-width: 480px) {
    #content {
        padding: 16px;
        border-radius: 16px;
        margin-top: 15px;
        margin-bottom: 140px;
    }
    
    #chapter-title {
        font-size: 1.5rem;
        padding: 14px;
    }
    
    .control-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }
    
    .control-btn {
        min-height: 60px;
        padding: 12px 8px;
        font-size: 12px;
    }
    
    .control-btn i {
        font-size: 18px;
        margin-bottom: 4px;
    }
    
    .segment {
        padding: 12px 16px;
    }
    
    #persistent-toggle-btn {
        width: 60px;
        height: 60px;
        font-size: 20px;
    }
    
    .video-control-btn {
        width: 45px;
        height: 45px;

    }
}

<script>
// ==================== 玻璃看窗增强系统 ====================

// 视频控制状态
const glassState = {
    videoEnabled: true,
    audioEnabled: false,
    glassEffects: true
};

// 初始化玻璃看窗系统
function initGlassSystem() {
    console.log('🔮 初始化玻璃看窗系统...');
    
    // 设置视频控制
    setupVideoControls();
    
    // 设置玻璃效果
    setupGlassEffects();
    
    // 预加载视频
    preloadVideo();
}

// 设置视频控制
function setupVideoControls() {
    const videoToggle = document.getElementById('video-toggle');
    const audioToggle = document.getElementById('audio-toggle');
    const glassEffectToggle = document.getElementById('glass-effect-toggle');
    const video = document.getElementById('quantum-video-background');
    
    // 视频开关
    videoToggle.addEventListener('click', () => {
        glassState.videoEnabled = !glassState.videoEnabled;
        video.style.opacity = glassState.videoEnabled ? '0.7' : '0';
        videoToggle.innerHTML = glassState.videoEnabled ? 
            '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
        playGlassSound(glassState.videoEnabled);
    });
    
    // 音频开关
    audioToggle.addEventListener('click', () => {
        glassState.audioEnabled = !glassState.audioEnabled;
        video.muted = !glassState.audioEnabled;
        audioToggle.innerHTML = glassState.audioEnabled ? 
            '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
        playGlassSound(glassState.audioEnabled);
    });
    
    // 玻璃效果开关
    glassEffectToggle.addEventListener('click', () => {
        glassState.glassEffects = !glassState.glassEffects;
        const frostLayer = document.querySelector('.glass-frost-layer');
        const refraction = document.querySelector('.glass-refraction');
        
        if (glassState.glassEffects) {
            frostLayer.style.display = 'block';
            refraction.style.display = 'block';
            glassEffectToggle.innerHTML = '<i class="fas fa-cube"></i>';
        } else {
            frostLayer.style.display = 'none';
            refraction.style.display = 'none';
            glassEffectToggle.innerHTML = '<i class="fas fa-cube"></i>';
        }
        playGlassSound(glassState.glassEffects);
    });
    
    // 初始设置
    videoToggle.title = glassState.videoEnabled ? '关闭视频背景' : '开启视频背景';
    audioToggle.title = glassState.audioEnabled ? '关闭背景音乐' : '开启背景音乐';
    glassEffectToggle.title = glassState.glassEffects ? '关闭玻璃效果' : '开启玻璃效果';
}

// 播放玻璃音效
function playGlassSound(enabled) {
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = enabled ? 600 : 300;
        oscillator.type = 'triangle';
        
        const now = audioContext.currentTime;
        gainNode.gain.setValueAtTime(0.3, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        
        oscillator.start(now);
        oscillator.stop(now + 0.3);
    } catch (error) {
        console.log('玻璃音效播放失败:', error);
    }
}

// 设置玻璃效果
function setupGlassEffects() {
    // 添加段落悬停效果增强
    const segments = document.querySelectorAll('.segment');
    segments.forEach(segment => {
        segment.addEventListener('mouseenter', () => {
            if (glassState.glassEffects) {
                segment.style.transform = 'translateY(-3px) translateX(5px)';
                segment.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            }
        });
        
        segment.addEventListener('mouseleave', () => {
            if (!segment.classList.contains('highlight')) {
                segment.style.transform = '';
            }
        });
    });
    
    // 添加内容区入场动画
    const content = document.getElementById('content');
    content.style.opacity = '0';
    content.style.transform = 'translateY(20px)';
    
    setTimeout(() => {
        content.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
        content.style.opacity = '1';
        content.style.transform = 'translateY(0)';
    }, 100);
}

// 预加载视频
function preloadVideo() {
    const video = document.getElementById('quantum-video-background');
    
    video.addEventListener('loadeddata', () => {
        console.log('🎥 玻璃背景视频加载完成');
        // 视频加载完成后轻微增强效果
        if (glassState.glassEffects) {
            setTimeout(() => {
                video.style.filter = 
                    'brightness(1.4) contrast(1.3) saturate(1.5)';
                setTimeout(() => {
                    video.style.filter = 
                        'brightness(1.3) contrast(1.2) saturate(1.4)';
                }, 1000);
            }, 500);
        }
    });
    
    // 处理视频错误
    video.addEventListener('error', () => {
        console.error('视频加载失败，使用默认背景');
        // 可以在这里添加备选背景
    });
}

// ==================== 原有逻辑保持不变 ====================

// --- Global Constants and State Management ---
const params = new URLSearchParams(window.location.search);
const category = params.get("category");
const bookId = params.get("book");
let chapter = params.get("chapter") || "cover";

// State
let chapterPlainText = "";
let isPlayingSequence = false;
let currentSegmentIndex = 0;
let playbackRate = 1.0;
let controlsVisible = true;

// 搜索相关状态
let searchMatches = [];
let currentMatchIndex = -1;
let lastSearchTerm = "";

// Theme list
const themes = [
    { name: 'default', display: '默认' },
    { name: 'dark', display: '暗黑' },
    { name: 'sepia', display: '护眼' },
];
let currentThemeIndex = 0;

if (!category || !bookId) {
    document.getElementById("chapter-body").innerHTML =
    '<div class="error"><b>Error:</b> Missing URL parameters (category/book).</div>';
    throw new Error("Missing params");
}

// --- 搜索功能函数 ---

function searchInChapter() {
    const searchInput = document.getElementById('searchInput');
    const searchTerm = searchInput.value.trim();
    const searchStatsOutput = document.getElementById('search-stats-output');
    const searchStatsText = document.getElementById('search-stats-text');
    const searchNavigation = document.getElementById('search-navigation');
    const searchBtn = document.querySelector('.btn-search');
    
    if (!searchTerm) {
        searchStatsText.innerHTML = '<p class="text-red-500">请输入要搜索的关键词。</p>';
        searchStatsOutput.classList.remove('hidden');
        return;
    }
    
    clearSearchHighlights();
    lastSearchTerm = searchTerm;
    
    searchBtn.disabled = true;
    searchInput.disabled = true;
    searchStatsOutput.classList.remove('hidden');
    searchStatsText.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> 正在搜索 "${searchTerm}"...`;
    
    setTimeout(() => {
        performSearch(searchTerm);
        searchBtn.disabled = false;
        searchInput.disabled = false;
    }, 100);
}

function performSearch(searchTerm) {
    const segments = document.querySelectorAll("#chapter-body .segment");
    const searchStatsText = document.getElementById('search-stats-text');
    const searchNavigation = document.getElementById('search-navigation');
    
    searchMatches = [];
    currentMatchIndex = -1;
    
    segments.forEach((segment, index) => {
        const text = segment.textContent || segment.innerText;
        const regex = new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        const matches = [...text.matchAll(regex)];
        
        if (matches.length > 0) {
            searchMatches.push({
                segmentIndex: index,
                segment: segment,
                matches: matches.length
            });
            segment.classList.add('search-match');
        }
    });
    
    if (searchMatches.length > 0) {
        const totalMatches = searchMatches.reduce((sum, match) => sum + match.matches, 0);
        searchStatsText.innerHTML = `
            <p>搜索 "<span class="font-bold text-blue-600">${searchTerm}</span>" 的结果：</p>
            <p class="mt-2">• 匹配段落数: <span class="font-bold">${searchMatches.length}</span></p>
            <p>• 总匹配次数: <span class="font-bold">${totalMatches}</span></p>
            <p class="mt-2 text-sm text-gray-600">使用下方按钮在匹配结果间导航</p>
        `;
        searchNavigation.classList.remove('hidden');
        navigateToNextMatch();
    } else {
        searchStatsText.innerHTML = `
            <p>未找到包含 "<span class="font-bold text-red-600">${searchTerm}</span>" 的段落。</p>
            <p class="mt-2 text-sm text-gray-600">请尝试其他关键词。</p>
        `;
        searchNavigation.classList.add('hidden');
    }
}

function navigateToPrevMatch() {
    if (searchMatches.length === 0) return;
    
    if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        searchMatches[currentMatchIndex].segment.classList.remove('current-search-match');
    }
    
    currentMatchIndex--;
    if (currentMatchIndex < 0) {
        currentMatchIndex = searchMatches.length - 1;
    }
    
    searchMatches[currentMatchIndex].segment.classList.add('current-search-match');
    searchMatches[currentMatchIndex].segment.scrollIntoView({ 
        behavior: "smooth", 
        block: "center"
    });
    updateSearchNavButtons();
}

function navigateToNextMatch() {
    if (searchMatches.length === 0) return;
    
    if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        searchMatches[currentMatchIndex].segment.classList.remove('current-search-match');
    }
    
    currentMatchIndex++;
    if (currentMatchIndex >= searchMatches.length) {
        currentMatchIndex = 0;
    }
    
    searchMatches[currentMatchIndex].segment.classList.add('current-search-match');
    searchMatches[currentMatchIndex].segment.scrollIntoView({ 
        behavior: "smooth", 
        block: "center"
    });
    updateSearchNavButtons();
}

function updateSearchNavButtons() {
    const prevMatchBtn = document.getElementById('prev-match-btn');
    const nextMatchBtn = document.getElementById('next-match-btn');
    
    if (searchMatches.length > 1) {
        prevMatchBtn.disabled = false;
        nextMatchBtn.disabled = false;
    } else {
        prevMatchBtn.disabled = true;
        nextMatchBtn.disabled = true;
    }
}

function clearSearch() {
    clearSearchHighlights();
    searchMatches = [];
    currentMatchIndex = -1;
    lastSearchTerm = "";
    document.getElementById('search-stats-output').classList.add('hidden');
    document.getElementById('searchInput').value = "";
}

function clearSearchHighlights() {
    const segments = document.querySelectorAll("#chapter-body .segment");
    segments.forEach(segment => {
        segment.classList.remove('search-match');
        segment.classList.remove('current-search-match');
    });
}

// --- 章节摘要功能 ---

async function generateSummary() {
    const summaryOutput = document.getElementById('llm-summary-output');
    const summaryTextEl = document.getElementById('summary-text');
    const summaryBtn = document.getElementById('summaryBtn');
    
    if (chapterPlainText.trim().length < 50) {
        summaryTextEl.innerHTML = "章节内容过短，无法生成摘要。";
        summaryOutput.classList.remove('hidden');
        return;
    }
    
    summaryOutput.classList.remove('hidden');
    summaryTextEl.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 正在生成章节摘要，请稍候...';
    summaryBtn.disabled = true;

    setTimeout(() => {
        const sentences = chapterPlainText.split(/[。！？.!?]/).filter(s => s.trim().length > 0);
        let summary = "";
        
        if (sentences.length > 5) {
            summary += sentences[0] + "。";
            const middleIndex = Math.floor(sentences.length / 2);
            summary += sentences[middleIndex] + "。";
            summary += sentences[sentences.length - 1] + "。";
        } else if (sentences.length > 0) {
            for (let i = 0; i < Math.min(3, sentences.length); i++) {
                summary += sentences[i] + "。";
            }
        } else {
            summary = "无法从当前内容生成摘要。";
        }
        
        // 添加玻璃效果到摘要文本
        summaryTextEl.innerHTML = `<div class="p-3 bg-white/10 backdrop-blur-sm rounded-lg">${summary}</div>`;
        summaryBtn.disabled = false;
    }, 1500);
}

// --- Utility Functions ---

function getPaths() {
    const base = `database/${category}/${bookId}`;
    const chapterName = chapter === "cover" ? "cover" : `chapter${chapter}`;
    return {
        html: `${base}/${chapterName}.html`,
        audio: `${base}/audio/${chapterName}.mp3`
    };
}

function redirect(shouldContinuePlay = false) {
    let url = `reader.html?category=${category}&book=${bookId}&chapter=${chapter}`;
    if (shouldContinuePlay) {
        url += '&continueplay=true';
    }
    location.href = url;
}

async function chapterExists(chNum) {
    const chapterName = chNum === "cover" ? "cover" : `chapter${chNum}`;
    const testPath = `database/${category}/${bookId}/${chapterName}.html`;
    try {
        const resp = await fetch(testPath, { method: 'HEAD' });
        return resp.ok;
    } catch {
        return false;
    }
}

async function audioExists(audioPath) {
    try {
        const resp = await fetch(audioPath, { method: 'HEAD' });
        return resp.ok;
    } catch {
        return false;
    }
}

// --- Audio and Player Functions ---

async function loadChapter() {
    const { html, audio } = getPaths();
    const audioEl = document.getElementById("audio");
    const titleEl = document.getElementById("chapter-title");
    const bodyEl = document.getElementById("chapter-body");
    const summaryOutput = document.getElementById('llm-summary-output');
    const searchStatsOutput = document.getElementById('search-stats-output');

    summaryOutput.classList.add('hidden');
    searchStatsOutput.classList.add('hidden');
    document.getElementById('summary-text').textContent = '点击下方的 "✨ 总结章节" 按钮来生成摘要。';
    clearSearchHighlights();
    
    titleEl.innerText = chapter === "cover" ? "封面" : `第 ${chapter} 页`;
    bodyEl.innerHTML = '<div class="loading">📖 正在加载章节内容...</div>';

    try {
        const resp = await fetch(html);
        if (!resp.ok) throw new Error("Chapter content not found.");

        const text = await resp.text();
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = text;
        chapterPlainText = tempDiv.textContent || tempDiv.innerText || "";
        
        const segmentedText = text.replace(/<p>/g, '<p class="segment" onclick="seekToSegment(this)">');
        bodyEl.innerHTML = segmentedText;
        document.getElementById('summaryBtn').disabled = false;

        // 添加玻璃效果到新加载的段落
        setTimeout(() => {
            const segments = document.querySelectorAll("#chapter-body .segment");
            segments.forEach(segment => {
                segment.style.opacity = '0';
                segment.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    segment.style.transition = 'all 0.5s ease';
                    segment.style.opacity = '1';
                    segment.style.transform = 'translateY(0)';
                }, 100);
            });
        }, 100);

    } catch (e) {
        bodyEl.innerHTML =
        `<div class="error"><b>⚠️ 内容加载错误:</b> 找不到章节文件 ${html}</div>`;
        console.error(e);
        document.getElementById('summaryBtn').disabled = true;
        return;
    }

    const audioPath = `database/${category}/${bookId}/audio/${chapter === "cover" ? "cover" : `chapter${chapter}`}.mp3`;
    const audioAvailable = await audioExists(audioPath);

    if (audioAvailable) {
        audioEl.src = audio;
        audioEl.load();
        audioEl.playbackRate = playbackRate;
        setupAudioEvents();
    } else {
        audioEl.src = "";
        audioEl.pause();
        document.getElementById("playBtn").disabled = true;
        bodyEl.insertAdjacentHTML('beforebegin', 
            '<div class="error" id="audio-error"><b>注意:</b> 找不到本章音频。仅提供文字阅读。</div>');
    }

    currentSegmentIndex = 0;
    updateNavigationButtons();
    updateContinuousStatus();
    saveProgress();
}

function setupAudioEvents() {
    const audioEl = document.getElementById("audio");
    audioEl.onended = null;
    audioEl.ontimeupdate = null;
    audioEl.onended = handleAudioEnded;
    audioEl.ontimeupdate = highlightSegment;
    document.getElementById("playBtn").disabled = false;
    const errorEl = document.getElementById("audio-error");
    if (errorEl) errorEl.remove();
}

async function togglePlay(forcePlay = false) {
    const audioEl = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    
    if (audioEl.disabled || !audioEl.src) return;
    
    if (audioEl.paused || forcePlay) {
        if (!forcePlay && !isPlayingSequence) {
             isPlayingSequence = true;
             localStorage.setItem('isPlayingSequence', true);
             updateContinuousStatus();
        }
        
        try {
            await audioEl.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i><span>暂停</span>';
            playBtn.classList.add('playing');
        } catch (e) {
            playBtn.innerHTML = '<i class="fas fa-play"></i><span>播放</span>';
            playBtn.classList.remove('playing');
        }
    } else {
        audioEl.pause();
        playBtn.innerHTML = '<i class="fas fa-play"></i><span>播放</span>';
        playBtn.classList.remove('playing');
    }
}

async function nextChapter(isAuto = false) {
    if (isAuto && !isPlayingSequence) return;
    
    let nextChapterNum;
    if (chapter === "cover") {
        nextChapterNum = 1;
    } else {
        nextChapterNum = parseInt(chapter) + 1;
    }

    if (!(await chapterExists(nextChapterNum))) {
        alert("🎉 本书已读完!");
        isPlayingSequence = false;
        localStorage.setItem('isPlayingSequence', false);
        updateContinuousStatus();
        document.getElementById("playBtn").innerHTML = '<i class="fas fa-play"></i><span>播放</span>';
        document.getElementById("playBtn").classList.remove('playing');
        return;
    }

    chapter = nextChapterNum.toString();
    redirect(isPlayingSequence);
}

function prevChapter() {
    if (chapter === "cover") return;
    const prev = Number(chapter) - 1;
    chapter = prev <= 0 ? "cover" : prev.toString();
    redirect(isPlayingSequence);
}

async function handleAudioEnded() {
    if (isPlayingSequence) {
        await nextChapter(true); 
    } else {
        document.getElementById("playBtn").innerHTML = '<i class="fas fa-play"></i><span>播放</span>';
        document.getElementById("playBtn").classList.remove('playing');
    }
}

function highlightSegment() {
    const audioEl = document.getElementById("audio");
    const paragraphs = document.querySelectorAll("#chapter-body .segment");
    
    if (!paragraphs.length || !audioEl.duration) return;

    const duration = audioEl.duration;
    const segmentDuration = duration / paragraphs.length;
    let index = Math.floor(audioEl.currentTime / segmentDuration);
    index = Math.max(0, Math.min(index, paragraphs.length - 1));

    if (index !== currentSegmentIndex) {
        paragraphs.forEach(p => p.classList.remove("highlight"));
        if (paragraphs[index]) {
            paragraphs[index].classList.add("highlight");
            paragraphs[index].scrollIntoView({ 
                behavior: "smooth", 
                block: "center",
                inline: "nearest"
            });
        }
        currentSegmentIndex = index;
    }
}

function seekToSegment(p) {
    const audioEl = document.getElementById("audio");
    const paragraphs = Array.from(document.querySelectorAll("#chapter-body .segment"));
    const index = paragraphs.indexOf(p);
    
    if (index === -1 || !audioEl.duration) return;

    const duration = audioEl.duration;
    const segmentDuration = duration / paragraphs.length;
    audioEl.currentTime = index * segmentDuration;
    
    if (audioEl.paused) {
        togglePlay(true);
    }
}

function changeSpeed(delta) {
    const audioEl = document.getElementById("audio");
    playbackRate = Math.max(0.5, Math.min(2.0, playbackRate + delta));
    playbackRate = Math.round(playbackRate * 100) / 100;
    
    if (audioEl) {
        audioEl.playbackRate = playbackRate;
    }
    
    document.getElementById('currentSpeed').textContent = playbackRate.toFixed(2) + 'x';
    localStorage.setItem('playbackRate', playbackRate);
}

// --- UI and Settings Functions ---

async function updateNavigationButtons() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    prevBtn.disabled = chapter === "cover";
    let nextNum = chapter === "cover" ? 1 : Number(chapter) + 1;
    nextBtn.disabled = !(await chapterExists(nextNum));
}

function updateContinuousStatus() {
    document.getElementById('continuousStatus').textContent = isPlayingSequence ? '已开启' : '已关闭';
    const playlistBtn = document.getElementById("playlistBtn");
    if (isPlayingSequence) {
        playlistBtn.classList.add('active');
        playlistBtn.style.background = 'linear-gradient(45deg, rgba(29, 233, 182, 0.8), rgba(0, 166, 138, 0.8))';
    } else {
        playlistBtn.classList.remove('active');
        playlistBtn.style.background = '';
    }
}

function toggleContinuousPlay() {
    isPlayingSequence = !isPlayingSequence;
    localStorage.setItem('isPlayingSequence', isPlayingSequence);
    updateContinuousStatus();
    
    if (!isPlayingSequence) {
        const audioEl = document.getElementById("audio");
        if (!audioEl.paused) {
             togglePlay(); 
        }
    }
}

function toggleControls() {
    controlsVisible = !controlsVisible;
    document.body.classList.toggle('controls-hidden', !controlsVisible);
    localStorage.setItem('controlsVisible', controlsVisible);

    const toggleBtn = document.getElementById('persistent-toggle-btn');
    if (toggleBtn) {
        const icon = toggleBtn.querySelector('i');
        if (controlsVisible) {
            icon.className = 'fas fa-eye-slash';
            toggleBtn.style.background = 'linear-gradient(45deg, rgba(156, 39, 176, 0.5), rgba(186, 104, 200, 0.5))';
        } else {
            icon.className = 'fas fa-eye';
            toggleBtn.style.background = 'linear-gradient(45deg, rgba(255, 111, 97, 0.5), rgba(255, 153, 102, 0.5))';
        }
    }
}

function cycleTheme() {
    currentThemeIndex = (currentThemeIndex + 1) % themes.length;
    const theme = themes[currentThemeIndex];
    changeTheme(theme.name);
}

function changeTheme(themeName) {
    document.body.className = 'theme-' + themeName;
    const theme = themes.find(t => t.name === themeName) || themes[0];
    document.getElementById('currentTheme').textContent = theme.display;
    currentThemeIndex = themes.findIndex(t => t.name === themeName);
    localStorage.setItem('readerTheme', themeName);
}

function goHome() {
    window.location.href = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/library.html';
}

// --- Initialization and State Restoration ---

function initSettings() {
    const savedSpeed = localStorage.getItem('playbackRate');
    if (savedSpeed) {
        playbackRate = parseFloat(savedSpeed);
        document.getElementById('currentSpeed').textContent = playbackRate.toFixed(2) + 'x';
    }
    
    const savedTheme = localStorage.getItem('readerTheme') || 'default';
    changeTheme(savedTheme);
    
    const savedControls = localStorage.getItem('controlsVisible');
    if (savedControls === 'false') {
        controlsVisible = false;
        document.body.classList.add('controls-hidden');
    }
    
    const toggleBtn = document.getElementById('persistent-toggle-btn');
    if (toggleBtn) {
        const icon = toggleBtn.querySelector('i');
        if (controlsVisible) {
            icon.className = 'fas fa-eye-slash';
            toggleBtn.style.background = 'linear-gradient(45deg, rgba(156, 39, 176, 0.5), rgba(186, 104, 200, 0.5))';
        } else {
            icon.className = 'fas fa-eye';
            toggleBtn.style.background = 'linear-gradient(45deg, rgba(255, 111, 97, 0.5), rgba(255, 153, 102, 0.5))';
        }
    }
    
    const savedSequence = localStorage.getItem('isPlayingSequence');
    const urlContinue = params.get("continueplay") === "true";

    if (savedSequence === 'true' || urlContinue) {
        isPlayingSequence = true;
    } else {
         isPlayingSequence = false;
    }
    updateContinuousStatus();
}

function saveProgress() {
    localStorage.setItem(`progress_${category}_${bookId}`, chapter);
}

// --- Main Application Initializer ---

async function initApp() {
    // 初始化设置
    initSettings();
    
    // 初始化玻璃看窗系统
    initGlassSystem();
    
    // 加载章节内容
    await loadChapter();
    
    // 处理自动连续播放
    const urlContinue = params.get("continueplay") === "true";
    const audioEl = document.getElementById("audio");
    const audioAvailable = !!audioEl.src;

    if (urlContinue && audioAvailable && isPlayingSequence) {
        const url = new URL(window.location);
        url.searchParams.delete('continueplay');
        window.history.replaceState({}, '', url.toString());
        togglePlay(true);
    }
}

// --- Event Listeners ---

document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch(e.key) {
        case "ArrowLeft":
            e.preventDefault();
            prevChapter();
            break;
        case "ArrowRight":
            e.preventDefault();
            nextChapter();
            break;
        case " ":
            e.preventDefault();
            togglePlay();
            break;
        case "[":
            e.preventDefault();
            changeSpeed(-0.25);
            break;
        case "]":
            e.preventDefault();
            changeSpeed(0.25);
            break;
        case "/":
            e.preventDefault();
            document.getElementById('searchInput').focus();
            break;
        case "F3":
            e.preventDefault();
            if (lastSearchTerm) {
                navigateToNextMatch();
            }
            break;
        case "Escape":
            e.preventDefault();
            clearSearch();
            break;
    }
});

document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        searchInChapter();
    }
});

// 添加玻璃系统键盘快捷键
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey) {
        switch(e.key) {
            case 'v':
                e.preventDefault();
                document.getElementById('video-toggle').click();
                break;
            case 'a':
                e.preventDefault();
                document.getElementById('audio-toggle').click();
                break;
            case 'g':
                e.preventDefault();
                document.getElementById('glass-effect-toggle').click();
                break;
        }
    }
});

// --- Start Application ---
initApp();
</script>
