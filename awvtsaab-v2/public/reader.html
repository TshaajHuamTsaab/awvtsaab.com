<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<title>Awv's奇迹踪印 - 玻璃阅读机 · 精简版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ==================== 量子玻璃看窗基础效果 ==================== */

/* 玻璃视频背景 - 高级效果 */
#quantum-video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    opacity: 0.7;
    transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
    filter: brightness(1.3) contrast(1.2) saturate(1.4) blur(0px);
    transform: scale(1.02);
}

/* 玻璃磨砂层 */
.glass-frost-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg,
        rgba(255, 255, 255, 0.05) 0%,
        rgba(255, 255, 255, 0.02) 50%,
        rgba(255, 255, 255, 0.05) 100%);
    backdrop-filter: blur(25px) saturate(200%);
    -webkit-backdrop-filter: blur(25px) saturate(200%);
    z-index: -1;
}

/* 动态玻璃折射效果 */
.glass-refraction {
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg,
        transparent 30%,
        rgba(255, 255, 255, 0.08) 50%,
        transparent 70%);
    animation: refraction-flow 20s infinite linear;
    pointer-events: none;
    z-index: -1;
}

@keyframes refraction-flow {
    0% { transform: rotate(0deg) translateX(-50%); }
    100% { transform: rotate(360deg) translateX(-50%); }
}

/* ==================== 主内容区玻璃效果 ==================== */
#content {
    padding: 20px;
    max-width: 900px;
    margin: auto;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 24px;
    margin-top: 70px;  /* 给左上按钮留空间 */
    margin-bottom: 90px; /* 给底部固定栏留空间 */
    
    backdrop-filter: blur(35px) saturate(200%);
    -webkit-backdrop-filter: blur(35px) saturate(200%);
    
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
    
    background-image: linear-gradient(135deg, 
            rgba(255, 255, 255, 0.15) 0%, 
            rgba(255, 255, 255, 0.08) 50%, 
            rgba(255, 255, 255, 0.15) 100%);
    
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 1;
}

#content::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(45deg, 
        rgba(0, 255, 204, 0.1), 
        rgba(0, 255, 153, 0.1), 
        rgba(0, 255, 102, 0.1));
    border-radius: 26px;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.5s ease;
}

#content:hover::before {
    opacity: 0.3;
    animation: content-glow 3s infinite alternate;
}

@keyframes content-glow {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.5; }
}

/* ==================== 章节标题玻璃特效 ==================== */
#chapter-title { 
    font-size: 2.2rem; 
    font-weight: 800; 
    margin-bottom: 25px; 
    color: #1a1a1a;
    text-align: center;
    padding: 18px;
    
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
    
    text-shadow: 0 2px 15px rgba(0, 0, 0, 0.1),
                 0 0 30px rgba(255, 255, 255, 0.3);
    
    position: relative;
    overflow: hidden;
}

#chapter-title::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.15), 
        transparent);
    animation: title-shine 8s infinite linear;
}

@keyframes title-shine {
    0% { left: -100%; }
    100% { left: 100%; }
}

/* ==================== 段落玻璃效果 ==================== */
.segment {
    line-height: 1.8;
    margin-bottom: 1.2rem;
    padding: 16px 20px;
    border-radius: 16px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
    
    position: relative;
    overflow: hidden;
}

.segment::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.12), 
        transparent);
    transition: left 0.6s ease;
    z-index: 0;
}

.segment:hover {
    transform: translateY(-3px) translateX(5px);
    background: rgba(255, 255, 255, 0.3);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
    border-color: rgba(255, 255, 255, 0.35);
}

.segment:hover::before {
    left: 100%;
}

.segment.highlight {
    background: rgba(76, 175, 80, 0.35);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(76, 175, 80, 0.5);
    box-shadow: 0 0 40px rgba(76, 175, 80, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
    font-weight: 600;
}

.segment.search-match {
    background: rgba(255, 235, 59, 0.3);
    backdrop-filter: blur(15px);
    border-left: 5px solid rgba(255, 152, 0, 0.7);
}

.segment.current-search-match {
    background: rgba(255, 152, 0, 0.4);
    backdrop-filter: blur(20px);
    border-left: 5px solid rgba(255, 87, 34, 0.9);
    font-weight: bold;
}

/* ==================== 搜索区域玻璃效果 ==================== */
.flex.flex-col.gap-2.p-4.border {
    background: rgba(239, 246, 255, 0.3) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(59, 130, 246, 0.3) !important;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
}

/* 搜索输出框玻璃效果 */
.search-output-box {
    margin-top: 25px;
    padding: 20px;
    border-radius: 20px;
    
    background: rgba(255, 255, 255, 0.25) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.search-results { border-left: 6px solid rgba(14, 165, 233, 0.7); }
.search-stats { border-left: 6px solid rgba(249, 115, 22, 0.7); }

/* 搜索导航按钮 */
.search-nav {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.search-nav-btn {
    padding: 8px 16px;
    border-radius: 25px;
    border: none;
    background: rgba(76, 175, 80, 0.35);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    color: white;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s;
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
}

.search-nav-btn:hover { transform: translateY(-3px); background: rgba(76, 175, 80, 0.5); }
.search-nav-btn:disabled { opacity: 0.4; transform: none; }

/* ==================== 加载和错误提示 ==================== */
.loading, .error {
    text-align: center;
    padding: 40px;
    font-size: 1.1rem;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.25);
}

.loading { color: #333; }
.error { color: #dc3545; }

/* ==================== 主题系统 ==================== */
:root {
    --bg-color: #fafafa;
    --text-color: #333333;
}

.theme-dark {
    --bg-color: #0a0a0a;
    --text-color: #e8e8e8;
}
.theme-sepia {
    --bg-color: #f0e6d2;
    --text-color: #5c4b37;
}

body { 
    font-family: 'Inter', 'Segoe UI', sans-serif; 
    background: var(--bg-color); 
    margin: 0; 
    padding: 0; 
    transition: background 0.5s ease, color 0.5s ease;
    color: var(--text-color);
    min-height: 100vh;
}

/* ==================== 左上角控制按钮 (玻璃) ==================== */
#video-controls {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 950;
}

.video-control-btn {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: #00ffcc;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.video-control-btn:hover {
    transform: translateY(-3px) scale(1.05);
    background: rgba(0, 0, 0, 0.5);
    border-color: rgba(0, 255, 204, 0.5);
    box-shadow: 0 10px 25px rgba(0, 255, 204, 0.2);
}

/* ==================== 底部小按钮栏 (6个紧凑按钮) ==================== */
#bottom-bar {
    position: fixed;
    bottom: 15px;
    left: 15px;
    right: 15px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 40px;
    padding: 8px 12px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    z-index: 900;
    max-width: 500px;
    margin: 0 auto;
}

.bottom-btn {
    background: transparent;
    border: none;
    color: #00ffcc;
    font-size: 1.3rem;
    width: 44px;
    height: 44px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.bottom-btn:active {
    background: rgba(0, 255, 200, 0.2);
    transform: scale(0.92);
}

.bottom-btn.special {
    color: #ffaa33;
}

#currentSpeedDisplay {
    font-size: 0.9rem;
    font-weight: bold;
    color: #00ffcc;
    background: rgba(0,0,0,0.3);
    padding: 4px 8px;
    border-radius: 20px;
    min-width: 50px;
    text-align: center;
}

/* 持久切换按钮 (右下) */
#persistent-toggle-btn {
    position: fixed;
    bottom: 85px;
    right: 18px;
    width: 52px;
    height: 52px;
    border-radius: 30px;
    background: rgba(156, 39, 176, 0.5);
    backdrop-filter: blur(12px);
    border: 1px solid #ffffff40;
    color: white;
    font-size: 1.5rem;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
}

.controls-hidden #bottom-bar {
    transform: translateY(120%);
    opacity: 0;
    pointer-events: none;
}

#audio { display: none; }

/* 响应式 */
@media (max-width: 480px) {
    #content { padding: 15px; margin-top: 80px; }
    #chapter-title { font-size: 1.8rem; padding: 12px; }
    .segment { padding: 12px 16px; }
    .video-control-btn { width: 42px; height: 42px; font-size: 1.2rem; }
    .bottom-btn { width: 38px; height: 38px; font-size: 1.1rem; }
    #currentSpeedDisplay { font-size: 0.8rem; padding: 3px 6px; }
}
</style>
</head>

<body class="theme-default">
<!-- 量子玻璃视频背景 -->
<video id="quantum-video-background" autoplay muted loop playsinline preload="auto">
    <source src="../database/homeicon/background.MP4" type="video/mp4">
    您的浏览器不支持视频标签。
</video>
<div class="glass-frost-layer"></div>
<div class="glass-refraction"></div>

<!-- 左上角控制按钮 (4个) -->
<div id="video-controls">
    <button id="video-toggle" class="video-control-btn" title="视频开关"><i class="fas fa-video"></i></button>
    <button id="audio-toggle" class="video-control-btn" title="背景音乐"><i class="fas fa-volume-mute"></i></button>
    <button id="glass-effect-toggle" class="video-control-btn" title="玻璃效果"><i class="fas fa-cube"></i></button>
    <button id="bg-color-toggle" class="video-control-btn" title="背景颜色"><i class="fas fa-paint-brush"></i></button>
</div>

<!-- 主内容区 -->
<div id="content">
    <div id="chapter-title">加载中...</div>
    
    <!-- 搜索区域 -->
    <div class="flex flex-col gap-2 p-4 border border-blue-200 bg-blue-50 rounded-xl mb-4">
        <h3 class="text-md font-semibold text-blue-700">🔍 搜索</h3>
        <div class="flex flex-col md:flex-row gap-2">
            <input type="text" id="searchInput" placeholder="关键词..." class="flex-grow p-3 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 transition bg-white/50 backdrop-blur-sm" />
            <button class="control-btn btn-search" onclick="searchInChapter()" style="height: 48px; background: linear-gradient(45deg, rgba(16,185,129,0.7), rgba(6,182,212,0.7));">
                <i class="fas fa-search"></i><span class="text-xs font-bold ml-1">搜索</span>
            </button>
        </div>
    </div>

    <!-- 搜索统计和导航 -->
    <div id="search-stats-output" class="search-output-box search-stats hidden">
        <h3 class="text-lg font-bold text-orange-700 mb-2 flex items-center"><i class="fas fa-chart-bar mr-2"></i>搜索结果</h3>
        <div id="search-stats-content"><p id="search-stats-text" class="text-gray-800 mb-3">等待搜索...</p></div>
        <div id="search-navigation" class="search-nav hidden">
            <button class="search-nav-btn" onclick="navigateToPrevMatch()"><i class="fas fa-arrow-left mr-1"></i>上一个</button>
            <button class="search-nav-btn" onclick="navigateToNextMatch()">下一个 <i class="fas fa-arrow-right ml-1"></i></button>
            <button class="search-nav-btn" onclick="clearSearch()" style="background: linear-gradient(45deg, rgba(255,107,107,0.7), rgba(255,142,142,0.7));"><i class="fas fa-times mr-1"></i>清除</button>
        </div>
    </div>
    
    <!-- 章节内容 -->
    <div id="chapter-body" class="loading">请稍候…</div>
</div>

<!-- 底部小按钮栏 (6个) 播放/暂停, 上一章, 下一章, 速度显示, 减速, 加速, 返回菜单 -->
<div id="bottom-bar">
    <button class="bottom-btn" onclick="togglePlay()" id="playBtn" title="播放/暂停"><i class="fas fa-play"></i></button>
    <button class="bottom-btn" onclick="prevChapter()" id="prevBtn" title="上一章"><i class="fas fa-backward"></i></button>
    <button class="bottom-btn" onclick="nextChapter()" id="nextBtn" title="下一章"><i class="fas fa-forward"></i></button>
    <span id="currentSpeedDisplay">1.0x</span>
    <button class="bottom-btn special" onclick="changeSpeed(-0.25)" title="减速"><i class="fas fa-minus"></i></button>
    <button class="bottom-btn special" onclick="changeSpeed(0.25)" title="加速"><i class="fas fa-plus"></i></button>
    <button class="bottom-btn" onclick="goHome()" title="返回菜单"><i class="fas fa-home"></i></button>
</div>

<!-- 持久切换按钮 (显示/隐藏底部栏) -->
<button id="persistent-toggle-btn" onclick="toggleControls()"><i class="fas fa-eye-slash"></i></button>

<audio id="audio" preload="metadata"></audio>

<script>
(function() {
    // ==================== 玻璃系统 ====================
    const glassState = {
        videoEnabled: true,
        audioEnabled: false,
        glassEffects: true,
        bgColorIndex: 0
    };

    const video = document.getElementById('quantum-video-background');

    function playGlassSound(enabled) {
        try {
            const actx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.connect(gain); gain.connect(actx.destination);
            osc.frequency.value = enabled ? 600 : 300;
            gain.gain.setValueAtTime(0.2, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.2);
            osc.start(); osc.stop(actx.currentTime + 0.2);
        } catch (e) {}
    }

    function setupVideoControls() {
        const videoToggle = document.getElementById('video-toggle');
        const audioToggle = document.getElementById('audio-toggle');
        const glassToggle = document.getElementById('glass-effect-toggle');
        const bgColorToggle = document.getElementById('bg-color-toggle');

        videoToggle?.addEventListener('click', () => {
            glassState.videoEnabled = !glassState.videoEnabled;
            if (video) video.style.opacity = glassState.videoEnabled ? '0.7' : '0';
            videoToggle.innerHTML = glassState.videoEnabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
            playGlassSound(glassState.videoEnabled);
        });

        audioToggle?.addEventListener('click', () => {
            glassState.audioEnabled = !glassState.audioEnabled;
            if (video) video.muted = !glassState.audioEnabled;
            audioToggle.innerHTML = glassState.audioEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
            playGlassSound(glassState.audioEnabled);
        });

        glassToggle?.addEventListener('click', () => {
            glassState.glassEffects = !glassState.glassEffects;
            const frost = document.querySelector('.glass-frost-layer');
            const refrac = document.querySelector('.glass-refraction');
            if (frost) frost.style.display = glassState.glassEffects ? 'block' : 'none';
            if (refrac) refrac.style.display = glassState.glassEffects ? 'block' : 'none';
            glassToggle.innerHTML = '<i class="fas fa-cube"></i>';
            playGlassSound(glassState.glassEffects);
        });

        bgColorToggle?.addEventListener('click', () => {
            glassState.bgColorIndex = (glassState.bgColorIndex + 1) % 3;
            const colors = ['#0a0a1a', '#0a1a2a', '#1a0a2a'];
            document.body.style.backgroundColor = colors[glassState.bgColorIndex];
            playGlassSound(true);
        });
    }

    // ==================== 书籍逻辑 ====================
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category") || "default";
    const bookId = params.get("book") || "demo";
    let chapter = params.get("chapter") || "cover";

    let chapterPlainText = "";
    let isPlayingSequence = true;  // 自动连续播放
    let currentSegmentIndex = 0;
    let playbackRate = 1.0;
    let controlsVisible = true;

    let searchMatches = [], currentMatchIndex = -1, lastSearchTerm = "";

    const audioEl = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const speedDisplay = document.getElementById('currentSpeedDisplay');
    const chapterTitle = document.getElementById('chapter-title');
    const chapterBody = document.getElementById('chapter-body');

    // 工具函数
    function getPaths() {
        const base = `database/${category}/${bookId}`;
        const chName = chapter === "cover" ? "cover" : `chapter${chapter}`;
        return { html: `${base}/${chName}.html`, audio: `${base}/audio/${chName}.mp3` };
    }

    async function chapterExists(chNum) {
        if (!category || !bookId) return false;
        const chName = chNum === "cover" ? "cover" : `chapter${chNum}`;
        try { const r = await fetch(`database/${category}/${bookId}/${chName}.html`, { method: 'HEAD' }); return r.ok; } catch { return false; }
    }

    async function audioExists(p) { try { const r = await fetch(p, { method: 'HEAD' }); return r.ok; } catch { return false; } }

    function redirect(cont = true) {
        window.location.href = `?category=${category}&book=${bookId}&chapter=${chapter}${cont ? '&continueplay=true' : ''}`;
    }

    // 搜索相关
    window.searchInChapter = function() {
        const input = document.getElementById('searchInput');
        if (!input) return;
        const term = input.value.trim();
        if (!term) return;
        clearSearchHighlights();
        lastSearchTerm = term;
        performSearch(term);
    };

    function performSearch(term) {
        const segs = document.querySelectorAll("#chapter-body .segment");
        searchMatches = []; currentMatchIndex = -1;
        segs.forEach((s, idx) => {
            const text = s.textContent || s.innerText;
            if (text.toLowerCase().includes(term.toLowerCase())) {
                searchMatches.push({ segmentIndex: idx, segment: s });
                s.classList.add('search-match');
            }
        });
        const out = document.getElementById('search-stats-output');
        const nav = document.getElementById('search-navigation');
        const txt = document.getElementById('search-stats-text');
        if (searchMatches.length) {
            txt.innerHTML = `<p>找到 ${searchMatches.length} 个匹配段落</p>`;
            nav.classList.remove('hidden');
            out.classList.remove('hidden');
            navigateToNextMatch();
        } else {
            txt.innerHTML = `<p>未找到 "${term}"</p>`;
            nav.classList.add('hidden');
            out.classList.remove('hidden');
        }
    }

    window.navigateToPrevMatch = function() {
        if (!searchMatches.length) return;
        if (currentMatchIndex >= 0) searchMatches[currentMatchIndex].segment.classList.remove('current-search-match');
        currentMatchIndex = (currentMatchIndex - 1 + searchMatches.length) % searchMatches.length;
        searchMatches[currentMatchIndex].segment.classList.add('current-search-match');
        searchMatches[currentMatchIndex].segment.scrollIntoView({ behavior: "smooth", block: "center" });
    };

    window.navigateToNextMatch = function() {
        if (!searchMatches.length) return;
        if (currentMatchIndex >= 0) searchMatches[currentMatchIndex].segment.classList.remove('current-search-match');
        currentMatchIndex = (currentMatchIndex + 1) % searchMatches.length;
        searchMatches[currentMatchIndex].segment.classList.add('current-search-match');
        searchMatches[currentMatchIndex].segment.scrollIntoView({ behavior: "smooth", block: "center" });
    };

    window.clearSearch = function() {
        clearSearchHighlights();
        searchMatches = []; currentMatchIndex = -1;
        document.getElementById('search-stats-output')?.classList.add('hidden');
        document.getElementById('search-navigation')?.classList.add('hidden');
        document.getElementById('searchInput').value = '';
    };

    function clearSearchHighlights() {
        document.querySelectorAll("#chapter-body .segment").forEach(s => s.classList.remove('search-match', 'current-search-match'));
    }

    // 加载章节
    async function loadChapter() {
        const { html, audio } = getPaths();
        chapterTitle.innerText = chapter === "cover" ? "📖 封面" : `第 ${chapter} 页`;
        chapterBody.innerHTML = '<div class="loading">📖 加载中...</div>';
        clearSearchHighlights();

        try {
            const resp = await fetch(html);
            if (!resp.ok) throw new Error('Not found');
            const text = await resp.text();
            chapterPlainText = text.replace(/<[^>]*>/g, '').trim();
            const processed = text.replace(/<p>/g, '<p class="segment" onclick="seekToSegment(this)">');
            chapterBody.innerHTML = processed;
        } catch (e) {
            chapterBody.innerHTML = `<div class="error">加载失败</div>`;
        }

        const audioAvailable = await audioExists(audio);
        if (audioAvailable && audioEl) {
            audioEl.src = audio;
            audioEl.load();
            audioEl.playbackRate = playbackRate;
            setupAudioEvents();
        } else {
            if (audioEl) audioEl.src = '';
            playBtn.disabled = true;
        }
        updateNavButtons();
    }

    function setupAudioEvents() {
        audioEl.onended = handleAudioEnded;
        audioEl.ontimeupdate = highlightSegment;
        playBtn.disabled = false;
    }

    function handleAudioEnded() {
        if (isPlayingSequence) nextChapter(true);
        else playBtn.innerHTML = '<i class="fas fa-play"></i>';
    }

    function highlightSegment() {
        if (!audioEl?.duration) return;
        const paras = document.querySelectorAll("#chapter-body .segment");
        if (!paras.length) return;
        const idx = Math.floor((audioEl.currentTime / audioEl.duration) * paras.length);
        if (idx !== currentSegmentIndex) {
            paras.forEach(p => p.classList.remove('highlight'));
            if (paras[idx]) {
                paras[idx].classList.add('highlight');
                paras[idx].scrollIntoView({ behavior: "smooth", block: "center" });
            }
            currentSegmentIndex = idx;
        }
    }

    window.seekToSegment = function(p) {
        if (!audioEl?.duration) return;
        const paras = Array.from(document.querySelectorAll("#chapter-body .segment"));
        const idx = paras.indexOf(p);
        if (idx === -1) return;
        audioEl.currentTime = (idx / paras.length) * audioEl.duration;
        if (audioEl.paused) togglePlay(true);
    };

    window.togglePlay = function(force = false) {
        if (!audioEl?.src) return;
        if (audioEl.paused || force) {
            audioEl.play().then(() => playBtn.innerHTML = '<i class="fas fa-pause"></i>').catch(() => {});
        } else {
            audioEl.pause();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
    };

    window.nextChapter = async function(isAuto = false) {
        if (isAuto && !isPlayingSequence) return;
        let next = chapter === "cover" ? 1 : parseInt(chapter) + 1;
        if (!(await chapterExists(next))) {
            alert("全书完，返回封面");
            chapter = "cover";
            redirect(isPlayingSequence);
            return;
        }
        chapter = next.toString();
        redirect(isPlayingSequence);
    };

    window.prevChapter = async function() {
        if (chapter === "cover") return;
        let prev = parseInt(chapter) - 1;
        chapter = prev <= 0 ? "cover" : prev.toString();
        redirect(isPlayingSequence);
    };

    async function updateNavButtons() {
        if (!prevBtn || !nextBtn) return;
        prevBtn.disabled = chapter === "cover";
        let next = chapter === "cover" ? 1 : parseInt(chapter) + 1;
        nextBtn.disabled = !(await chapterExists(next).catch(() => false));
    }

    window.changeSpeed = function(delta) {
        playbackRate = Math.max(0.5, Math.min(2.0, playbackRate + delta));
        playbackRate = Math.round(playbackRate * 100) / 100;
        if (audioEl) audioEl.playbackRate = playbackRate;
        if (speedDisplay) speedDisplay.innerText = playbackRate.toFixed(2) + 'x';
    };

    window.goHome = function() { window.location.href = 'library.html'; };

    window.toggleControls = function() {
        controlsVisible = !controlsVisible;
        document.body.classList.toggle('controls-hidden', !controlsVisible);
        const icon = document.querySelector('#persistent-toggle-btn i');
        if (icon) icon.className = controlsVisible ? 'fas fa-eye-slash' : 'fas fa-eye';
    };

    // 主题切换 (保留双击标题)
    window.cycleTheme = function() {
        const themes = ['default', 'dark', 'sepia'];
        let idx = themes.indexOf(document.body.className.replace('theme-',''));
        idx = (idx + 1) % themes.length;
        document.body.className = 'theme-' + themes[idx];
        localStorage.setItem('readerTheme', themes[idx]);
    };
    document.getElementById('chapter-title')?.addEventListener('dblclick', window.cycleTheme);

    // 初始化
    function initSettings() {
        const savedRate = localStorage.getItem('playbackRate');
        if (savedRate) playbackRate = parseFloat(savedRate);
        if (speedDisplay) speedDisplay.innerText = playbackRate.toFixed(2) + 'x';
        const savedTheme = localStorage.getItem('readerTheme') || 'default';
        document.body.className = 'theme-' + savedTheme;
        const urlContinue = params.get("continueplay");
        if (urlContinue === 'true' || urlContinue === null) isPlayingSequence = true;
        else isPlayingSequence = false;
        if (video) video.muted = true;
    }

    async function init() {
        initSettings();
        setupVideoControls();
        await loadChapter();
        if (isPlayingSequence && audioEl?.src) setTimeout(() => togglePlay(true), 600);
    }

    if (category && bookId) init().catch(console.error);
    else chapterBody.innerHTML = '<div class="error">缺少参数</div>';
})();
</script>
</body>
</html>
