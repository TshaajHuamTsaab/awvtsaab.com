<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功 - AWVTS AAB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        /* ====== 基础样式 ====== */
        :root {
            --primary-color: #00ff99;
            --primary-glow: rgba(0, 255, 153, 0.7);
            --secondary-color: #00ff66;
            --accent-color: #00ccff;
            --bg-dark: #0d0d0d;
            --bg-darker: #050505;
            --card-bg: linear-gradient(145deg, #121212 0%, #1c1c1c 100%);
            --text-light: #aaffd5;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at top, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* ====== 背景效果 ====== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        
        .bg-particle {
            position: absolute;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.1;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(0) translateX(20px); }
            75% { transform: translateY(20px) translateX(10px); }
            100% { transform: translateY(0) translateX(0); }
        }
        
        /* ====== 成功容器 ====== */
        .success-container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0,255,100,0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .success-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }
        
        /* ====== 成功图标 ====== */
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
            animation: pulse 2s infinite;
        }
        
        .success-icon i {
            font-size: 3rem;
            color: #000;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 153, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 255, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 153, 0); }
        }
        
        /* ====== 标题和描述 ====== */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 15px var(--primary-glow);
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .success-message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--text-light);
            opacity: 0.9;
        }
        
        /* ====== 订单详情 ====== */
        .order-details {
            background: rgba(18, 18, 18, 0.8);
            border-radius: 15px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: left;
            border: 1px solid rgba(0,255,100,0.1);
        }
        
        .order-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--secondary-color);
            text-align: center;
        }
        
        .order-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 0.9rem;
            color: var(--text-light);
            opacity: 0.7;
            margin-bottom: 0.5rem;
        }
        
        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }
        
        /* ====== 会员状态 ====== */
        .membership-status {
            background: rgba(0, 255, 153, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 15px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: center;
        }
        
        .membership-badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .membership-details {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        /* ====== 下一步操作 ====== */
        .next-steps {
            margin: 2rem 0;
        }
        
        .steps-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--secondary-color);
        }
        
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        
        .step-card {
            background: rgba(18, 18, 18, 0.8);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(0,255,100,0.1);
        }
        
        .step-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,255,100,0.4);
        }
        
        .step-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        .step-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--secondary-color);
        }
        
        .step-desc {
            font-size: 0.9rem;
            color: var(--text-light);
            opacity: 0.8;
        }
        
        /* ====== 按钮样式 ====== */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: #000;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(0, 255, 153, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 255, 153, 0.5);
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }
        
        .btn-secondary:hover {
            background: rgba(0, 255, 153, 0.1);
        }
        
        /* ====== 倒计时 ====== */
        .countdown {
            margin-top: 2rem;
            font-size: 1rem;
            color: var(--text-light);
            opacity: 0.7;
        }
        
        /* ====== 响应式设计 ====== */
        @media (max-width: 768px) {
            .success-container {
                padding: 2rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .success-message {
                font-size: 1.1rem;
            }
            
            .order-info {
                grid-template-columns: 1fr;
            }
            
            .steps-grid {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .success-container {
                padding: 1.5rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .success-icon {
                width: 80px;
                height: 80px;
            }
            
            .success-icon i {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景动画 -->

    <!-- 成功容器 -->
    <div class="success-container">
        <!-- 成功图标 -->

        <!-- 标题和描述 -->

        <!-- 订单详情 -->

                    <span class="info-label" id="amountLabel">支付金额</span>

                </div>
                <div class="info-item">
                    <span class="info-label" id="dateLabel">支付日期</span>
                    <span class="info-value" id="dateValue">2023-11-15</span>

            </div>
            <div class="info-item">
                <span class="info-label" id="statusLabel">订单状态</span>

        <!-- 会员状态 -->

        </div>
        
        <!-- 下一步操作 -->
        <div class="next-steps">
            <h2 class="steps-title" id="nextStepsTitle">接下来做什么？</h2>
            <div class="steps-grid">
                <div class="step-card">
                    <div class="step-icon">
                        <i class="fas fa-book-open"></i>
                    </div>
                    <h3 class="step-title" id="step1Title">探索书库</h3>
                    <p class="step-desc" id="step1Desc">浏览我们完整的书籍收藏，发现新的阅读体验。</p>
                </div>
                <div class="step-card">
                    <div class="step-icon">
                        <i class="fas fa-download"></i>
                    </div>
                    <h3 class="step-title" id="step2Title">下载阅读</h3>
                    <p class="step-desc" id="step2Desc">下载您喜爱的书籍，随时随地离线阅读。</p>
                </div>
                <div class="step-card">
                    <div class="step-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <h3 class="step-title" id="step3Title">个性化设置</h3>
                    <p class="step-desc" id="step3Desc">调整阅读设置，打造专属的阅读体验。</p>
                </div>
            </div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="action-buttons">
            <a href="books.html" class="btn" id="browseBooksBtn">
                <i class="fas fa-book"></i>
                <span>浏览书库</span>
            </a>
            <a href="home.html" class="btn btn-secondary" id="goHomeBtn">
                <i class="fas fa-home"></i>
                <span>返回首页</span>
            </a>
        </div>
        
        <!-- 自动跳转倒计时 -->
        <div class="countdown" id="countdown">
            页面将在 <span id="countdownValue">10</span> 秒后自动跳转到书库
        </div>
    </div>

                nextStepsTitle: "နောက်တစ်ဆင့်ဘာလုပ်မလဲ?",

                countdownText: "စာမျက်နှာသည် စာကြည့်တိုက်သို့ အလိုအလျောက်ပြန်ညွှန်းမည်"
            }

        // 当前语言
        let currentLang = 'zh';
        
        // 背景粒子动画
        function createParticles() {
            const bgAnimation = document.getElementById('bgAnimation');
            const particleCount = 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('bg-particle');
                
                // 随机大小和位置
                const size = Math.random() * 80 + 30;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const delay = Math.random() * 15;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}%`;
                particle.style.top = `${posY}%`;
                particle.style.animationDelay = `${delay}s`;
                
                bgAnimation.appendChild(particle);
            }
        }
        
        // 更新页面语言
        function updateLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            // 更新所有文本元素
            Object.keys(t).forEach(key => {
                const element = document.getElementById(key);
                if (element) {
                    element.textContent = t[key];
                }
            });
            
            // 更新倒计时文本
            document.getElementById('countdown').innerHTML = 
                `${t.countdownText} <span id="countdownValue">10</span> ${lang === 'en' ? 'seconds' : lang === 'my' ? 'စက္ကန့်' : '秒'}${lang === 'en' ? '' : '后'}${lang === 'en' ? ' to library' : lang === 'my' ? ' စာကြည့်တိုက်သို့' : '自动跳转到书库'}`;
        }
        
        // 从URL获取订单信息
        function getOrderInfoFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                orderId: urlParams.get('orderId') || 'ORD_' + Date.now(),
                plan: urlParams.get('plan') || 'yearly',
                amount: urlParams.get('amount') || '228',
                currency: urlParams.get('currency') || 'MMK',
                userId: urlParams.get('userId') || 'user_' + Math.floor(Math.random() * 1000)
            };
        }
        
        // 更新订单信息显示
        function updateOrderInfo() {
            const orderInfo = getOrderInfoFromURL();
            
            // 更新订单详情
            document.getElementById('orderIdValue').textContent = orderInfo.orderId;
            
            // 根据计划类型显示
            const planNames = {
                'monthly': { zh: '月会员', en: 'Monthly', my: 'လစဉ်အသင်း' },
                'yearly': { zh: '年会员', en: 'Yearly', my: 'နှစ်စဉ်အသင်း' },
                'lifetime': { zh: '终身会员', en: 'Lifetime', my: 'တစ်သက်တာအသင်း' }
            };
            
            const planName = planNames[orderInfo.plan] || planNames.yearly;
            document.getElementById('planValue').textContent = planName[currentLang];
            
            // 更新金额
            document.getElementById('amountValue').textContent = `${orderInfo.amount} ${orderInfo.currency}`;
            
            // 更新日期
            const now = new Date();
            document.getElementById('dateValue').textContent = now.toISOString().split('T')[0];
            
            // 计算并显示到期日期
            let expiryDate = new Date();
            if (orderInfo.plan === 'monthly') {
                expiryDate.setMonth(expiryDate.getMonth() + 1);
            } else if (orderInfo.plan === 'yearly') {
                expiryDate.setFullYear(expiryDate.getFullYear() + 1);
            } else if (orderInfo.plan === 'lifetime') {
                expiryDate.setFullYear(expiryDate.getFullYear() + 100); // 100年视为永久
            }
            
            document.getElementById('expiryDate').textContent = expiryDate.toISOString().split('T')[0];
            
            // 保存会员信息到本地存储
            const membership = {
                userId: orderInfo.userId,
                plan: orderInfo.plan,
                active: true,
                expiresAt: expiryDate.toISOString(),
                activatedAt: now.toISOString()
            };
            
            localStorage.setItem(`membership_${orderInfo.userId}`, JSON.stringify(membership));
        }
        
        // 自动跳转倒计时
        function startCountdown() {
            let countdownValue = 10;
            const countdownElement = document.getElementById('countdownValue');
            
            const countdownInterval = setInterval(() => {
                countdownValue--;
                countdownElement.textContent = countdownValue;
                
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    window.location.href = 'books.html';
                }
            }, 1000);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            
            // 从本地存储获取语言偏好
            const savedLang = localStorage.getItem('preferredLanguage') || 'zh';
            updateLanguage(savedLang);
            
            // 更新订单信息
            updateOrderInfo();
            
            // 开始自动跳转倒计时
            startCountdown();
            
            console.log('支付成功页面加载完成');
        });
    </script>
</body>
</html>
