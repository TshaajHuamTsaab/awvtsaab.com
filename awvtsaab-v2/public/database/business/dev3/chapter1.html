<div class="chushi-zheng">

  <h2>《处世箴》</h2>
  <p>守口如瓶藏慧光，<strong>止语敛锋芒</strong>；价值如水润四方，<strong>利他舟自航</strong>；和而不同竹有节，<strong>亲疏皆坦荡</strong>；情绪如潭静无浪，<strong>内核稳山岗</strong>。</p>

  <p>示弱非是折脊梁，<strong>不争反为王</strong>；边界恰似玉屏风，<strong>善意带锋芒</strong>；看破浮云心澄明，<strong>不言意味长</strong>；投资自身如种树，<strong>终得参天昂</strong>。</p>

  <p>顺势借得千钧力，<strong>乘风破沧浪</strong>；低调谦和藏锦绣，<strong>明哲保身长</strong>；外圆内方君子道，<strong>和光同尘芳</strong>；守心如玉观寰宇，<strong>从容步康庄</strong>。</p>

</div>
