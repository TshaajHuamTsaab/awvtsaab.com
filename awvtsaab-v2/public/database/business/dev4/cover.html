<div class="wisdom-section">
  <h2>《黄石公略》精义诗篇</h2>

  <p><strong>道以静为本，德以仁为先。</strong><br>
  虚怀纳智，柔能制坚。</p>

  <p><strong>上德不争，天下莫与之争；</strong><br>
  上智不辩，天下莫能与辩。</p>

  <p><strong>将以仁恕为心，士以信义为本。</strong><br>
  恩不逾度，威不失中。</p>

  <p><strong>知势者，顺时而动；</strong><br>
  识人者，审心而用。</p>

  <p><strong>以静制躁，以柔克刚；</strong><br>
  不怒而威，不言而信。</p>

  <p><strong>明主不炫智，智者不露锋。</strong><br>
  守中而观变，因时以施功。</p>

  <p><strong>功成不居，名满不显；</strong><br>
  去欲存仁，藏锋养元。</p>

  <p><strong>天地有道，顺者昌；</strong><br>
  人心有衡，平者安。</p>

  <p><strong>善用兵者，未战而胜；</strong><br>
  善谋国者，无为而治。</p>

  <p><strong>静若处子，动若雷霆。</strong><br>
  以不争之道，定天下之争。</p>
</div>
